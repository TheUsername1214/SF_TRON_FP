PointfootCfg:
  loop_frequency: 50
  joint_names:
    - "abad_L_Joint"
    - "hip_L_Joint"
    - "knee_L_Joint"
    - "ankle_L_Joint"
    - "abad_R_Joint"
    - "hip_R_Joint"
    - "knee_R_Joint"
    - "ankle_R_Joint"

  init_state:
    # target angles [rad] when action = 0.0
    default_joint_angle:
      abad_L_Joint: 0.0
      hip_L_Joint: 0
      knee_L_Joint: 0.0
      ankle_L_Joint: 0.0

      abad_R_Joint: 0.0
      hip_R_Joint: 0
      knee_R_Joint: 0.0
      ankle_R_Joint: 0.0

  control:
    # PD Drive parameters:
    stiffness: 60
    damping: 5 # 1.5
    ankle_joint_stiffness: 30 # 0.8
    ankle_joint_damping: 2.5 # 0.8
    ankle_joint_torque_limit: 20
    action_scale_pos: 1
    decimation: 5
    user_torque_limit: 80


  size:
    actions_size: 8
    observations_size: 227

  stand_mode:
    stand_duration: 1.0

  imu_orientation_offset:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
